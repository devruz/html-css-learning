<!DOCTYPE html>
<html>
  <head>
    <title>Lesson10</title>
    <style>
      .container {
        align-items: center;
        margin-top: 10px;
        margin-bottom: 10px;
        padding: 10px;
        width: 300px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgb(229, 237, 234);
      }
      .bexa {
        width: 50px;
        height: 45px;
        border-radius: 25px;
        vertical-align: top;
      }
      .paragraphs {
        display: inline-block;
        vertical-align: top;
        width: 200px;
        margin-left: 10px;
      } 
      .name {
        vertical-align: top;
        margin-bottom: 0px;
      } 
      .human {
        margin-top: 0px;
        color: rgb(96, 96, 96);
        margin-bottom: 0px;
      }
      .ability {
        margin-top: 0px;
        color: rgb(96, 96, 96);
      }
      .button {
        display: inline-block;
      }
      .follow {
        background-color: rgb(72, 133, 245);
        color: white;
        padding: 5px 10px;
        border-radius: 4px;
        border: none;
      }
      .threecontainer {
        align-items: center;
        /* margin-top: 10px;
        margin-bottom: 10px; */
        padding: 4px;
        width: 300px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgb(229, 237, 234);
      }
      .wholecontainer {
        display: inline-block;
      }
      .longcontainer {
        width: 200px;
        height: 350px;
        margin-left: 10px;
        margin-right: 10px;
        background-color: rgb(229, 237, 234);
        display: inline-block;
      }
      .profilepicture{
        width: 200px;
        height: 200px;
      }
      .catname {
        margin-left: 5px;
        /* display: block; */
        margin-bottom: 2px;
        margin-top: 2px;
        margin-left: 5px;
      }
      .ramadancat {
        width: 40px;
        height: 40px;
        border-radius: 20px;
        display: inline-block;
      }
      .friends {
        margin-top: 2px;
        /* display: inline-block; */
        /* text-align: top;   */
        display: flex;
        color: rgb(96, 96, 96);
        align-items: center;
      }
      .add {
        background-color: rgb(80, 119, 234);
        color: white;
        border-radius: 4px;
        padding: 10px 20px;
        margin-left: 5px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="bexa" src="htmlpictures/dogtrip.jpg">
      <div class="paragraphs">
        <p class="name"><strong>devruz</strong></p>
        <p class="human">The human</p>
        <p class="ability">Popular</p>
      </div>
      <div class="button">
        <button class="follow">Follow</button>
      </div>
    </div>

    <div class="wholecontainer">
      <div class="threecontainer">
        <img class="bexa" src="htmlpictures/generaldog.jpg">
        <div class="paragraphs">
          <p class="name"><strong>Oliver</strong></p>
          <p class="human">The human</p>
          <p class="ability">Popular</p>
        </div>
        <div class="button">
          <button class="follow">Follow</button>
        </div>
      </div>

      <div class="threecontainer">
        <img class="bexa" src="htmlpictures/lion.jpg">
        <div class="paragraphs">
          <p class="name"><strong>Rex</strong></p>
          <p class="human">The human</p>
          <p class="ability">Popular</p>
        </div>
        <div class="button">
          <button class="follow">Follow</button>
        </div>
      </div>

      <div class="threecontainer">
        <img class="bexa" src="htmlpictures/horse.jpg">
        <div class="paragraphs">
          <p class="name"><strong>Mimi</strong></p>
          <p class="human">The human</p>
          <p class="ability">Popular</p>
        </div>
        <div class="button">
          <button class="follow">Follow</button>
        </div>
      </div>
    </div>
    
    <div class="longcontainer">
      <img class="profilepicture" src="htmlpictures/catbandit.jpg">
      <p class="catname"><strong>Oliver</strong></p>
      <img class="ramadancat" src="htmlpictures/catinramadan.jpg">
      <p class="friends">4 mutual frieds</p>
      <button class="add">Add Friend</button>

    </div>
  </body>
</html>
