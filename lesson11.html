<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid practice</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: 200px 200px 200px;
      column-gap: 20px;
    }
    .profile {
      width: 200px;
      height: 313px;
      width: 200px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
      vertical-align: top;
      margin-right: 15px;
      margin-top: 20px;

    }
    .main-picture {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin-bottom: 5px;
    }
    .mutual-friends-row {
      display: grid;
      grid-template-columns: 35px 1fr;
      align-items: center;
      margin-left: 8px;
      margin-bottom: 10px;
    }
    .mutual-friends-picture {
      height: 28px;
      width: 28px;
      object-fit: cover;
      border-radius: 14px;
      vertical-align: middle;
      margin-left: 5px;
      margin-top: 0;
      display: inline-block;
    }
    .add-friend-button {
      background-color: rgb(34, 122, 215);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      margin-top: 5px;
      margin-left: 5px;
    }
    .name {
      margin-top: 0;
      margin-left: 5px;
      margin-bottom: 0;
    }
    .friends {
      display: inline-block;
      margin-left: 5px;
      color: rgb(96, 96, 96);
      margin: 8px;
    }
  </style>
</head>
<body>
  <div style="
    display: grid;
    grid-template-columns: 100px 100px;
    ">
    <div style="background-color: yellow;">div 1</div>
    <div style="background-color: lightpink;">div 2<p>text</p></div>
  </div>

  <div style="
    display: grid;
    margin-top: 30px;
    grid-template-columns: 100px 100px;">
    <div style="background-color: yellow;">div 1</div>
    <div style="background-color: lightpink;">div 2<p>text</p></div>
  </div>

  <div style="
    display: grid;
    margin-top: 30px;
    grid-template-columns: 100px 1fr">
    <div style="background-color: yellow;">div 1</div>
    <div style="background-color: lightpink;">div 2</div>
  </div>

  <div style="
    display: grid;
    margin-top: 30px;
    grid-template-columns: 100px 1fr 2fr">
    <div style="background-color: lightblue;">100px</div>
    <div style="background-color: yellow;">1 fr</div>
    <div style="background-color: lightpink;">2 fr</div>
  </div>

  <div style="
  display: grid;
  margin-top: 30px;
  grid-template-columns: 200px 75px;">
  <div style="background-color: lightblue;">200px</div>
  <div style="background-color: lightpink;">75px</div>
  </div>

  <div style="
  display: grid;
  margin-top: 30px;
  grid-template-columns: 50px 1fr 75px;">
  <div style="background-color: lightblue;">col1</div>
  <div style="background-color: lightpink;">col2</div>
  <div style="background-color: lightblue;">col3</div>
  </div>

  <div style="
  display: grid;
  column-gap: 20px;
  margin-top: 30px;
  row-gap: 10px;
  grid-template-columns: 1fr 1fr 1fr 1fr;">
  <div style="background-color: lightpink;">col1</div>
  <div style="background-color: lightpink;">col2</div>
  <div style="background-color: lightpink;">col3</div>
  <div style="background-color: lightpink;">col4</div>
  <div style="background-color: lightpink;">col1</div>
  <div style="background-color: lightpink;">col2</div>
  <div style="background-color: lightpink;">col3</div>
  <div style="background-color: lightpink;">col4</div>
  </div>

  <div class="grid">
    <div class="profile">
      <img class="main-picture" src="htmlpictures/horse.jpg" >
      <p class="name"><strong>Oliver</strong></p>
      <div mutual-friends-row>
        <img class="mutual-friends-picture" src="htmlpictures/cat.jpg">
        <p class="friends">2 mutual friends</p>
      </div>
      <button class="add-friend-button">Add friend</button>
    </div>

    <div class="profile">
      <img class="main-picture" src="htmlpictures/catbandit.jpg" >
      <p class="name"><strong>Sam</strong></p>
      <div mutual-friends-row>
        <img class="mutual-friends-picture" src="htmlpictures/cat.jpg">
        <p class="friends">3 mutual friends</p>
      </div>
      <button class="add-friend-button">Add friend</button>
    </div>

    <div class="profile">
      <img class="main-picture" src="htmlpictures/generaldog.jpg" >
      <p class="name"><strong>Rex</strong></p>
      <div mutual-friends-row>
        <img class="mutual-friends-picture" src="htmlpictures/cat.jpg">
        <p class="friends">4 mutual friends</p>
      </div>
      <button class="add-friend-button">Add friend</button>
    </div>

  </div>
</body>
</html>
