<!DOCTYPE html>
<html>
  <head>
    <title>YouTube.com Clone</title>
    <style>
      .pagani {
        width: 300px;
        height: 300px;
        object-fit: contain;
        object-position: center;
        border-width: 2px;
        border-style: solid;
        border-color: red;

      }
      .searchbar {
        font-size: 20px;
        margin-left: 12PX;
        border-radius: 8px;
        border-width: 3px;
        height: 30px;
        width: 200px;
        border-color: rgba(123, 120, 120, 0.426);
        
      } 
      .croco {
        width: 200px;
      }
      .dog{
        width: 200px;
        height: 200px;
        object-position: center;
        object-fit: contain;
      }
      .leaders {
        width: 200px;
        height: 200px;
        border-radius: 100px;
      }
      .url {
        padding-left: 5px;
        width: 400px;
        height: 30px;
        border-radius: 15px;
        border: none;
        margin-top: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        
      }
      .email {
        color: grey;
        font-size: 20px
        
      }
      .emailbox {
        border-radius: 4px;
        width: 400px;
        height: 30px;
        border-color: grey;
      }
      .policy {
        color: grey;
        margin-top: 10px;
      }
      .agree {
        width:400px;
        height: 50px;
        border-radius: 25px;
        background-color: rgb(36, 93, 218);
        color: white;
        border: none;
        font-size: 20px;
      }
      .circle {
        width: 50px;
        height: 50px;
        border-radius: 25px;
        vertical-align: middle;

      }
      .what {
        color: grey;
        vertical-align: middle;
        margin-left: 10px;
      }
      .twet {
        background-color: rgb(2, 133, 209);
        color: white;
        margin-left: 170px;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
      }
    </style>

  </head>
  <body>
    <img class="pagani" src="lesson7pictures/pagani.jpg">
    <img class="croco" src="lesson7pictures/croco.jpg">
    <img class="dog" src="lesson7pictures/dog.jpg">
    <img class="leaders" src="lesson7pictures/leaders.jpg">
    <input class="searchbar" type="text" placeholder="search">
    <input class="url" type="text" placeholder ="Search Google or type a URL">
    <p class="email">Email</p>
    <input class="emailbox" type="text">
    <p class="policy">By clicking Agree & Join, you agree to the Privacy Policy.</p>
    <button class="agree">Agree & Join</button>
    <p><span><img class="circle" src="lesson7pictures/leaders.jpg"></span><span class="what">What's happening?</span><span class="twet">Tweet</span></p>


  </body>
</html>
